<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SENA Manizales - Experiencia 3D Inmersiva con VR, NPCs y campus completo">
  <title>SENA 3D - Experiencia Inmersiva</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <!-- Font Awesome desde CDN con crossorigin -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZ2JDJFifldBnToc5wPI4orW4liTikd4WrS2asbLmVcZT0MpHX4evM0QD9Q==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #050008;
      color: #ffffff;
    }
    
    /* Loading Screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #050008 0%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    
    .loading-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    .loading-logo {
      width: 120px;
      height: 120px;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loading-logo::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 3px solid rgba(139, 0, 0, 0.3);
      border-top-color: #8b0000;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    
    .loading-logo::after {
      content: '';
      position: absolute;
      inset: 15px;
      border: 2px solid rgba(75, 0, 130, 0.3);
      border-top-color: #4b0082;
      border-radius: 50%;
      animation: spin 2s linear infinite reverse;
    }
    
    .loading-logo-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #00ffff;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .loading-bar-container {
      width: 250px;
      height: 6px;
      background: rgba(100, 180, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(100, 180, 255, 0.2);
    }
    
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #8b0000, #4b0082, #00ffff);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 3px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }
    
    #loading-text {
      color: #00ffff;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
    
    .loading-tips {
      color: #8aa8c8;
      font-size: 12px;
      margin-top: 10px;
    }
    
    /* App Container */
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    /* Intro Container */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background: linear-gradient(135deg, #050008 0%, #0a0a1a 100%);
      display: none;
    }
    
    #intro-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    
    /* UI Overlay */
    #ui-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    
    #ui-overlay.visible {
      opacity: 1;
    }
    
    .panel {
      pointer-events: auto;
      background: rgba(10, 15, 26, 0.92);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 12px;
      padding: 16px 18px;
      color: #d0e0f8;
      font-size: 13px;
      backdrop-filter: blur(12px);
      line-height: 1.5;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    #controls-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 220px;
    }
    
    .ctrl-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      align-items: center;
    }
    
    .ctrl-key {
      background: rgba(139, 0, 0, 0.15);
      border: 1px solid rgba(139, 0, 0, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #ff6b6b;
      text-align: center;
      white-space: nowrap;
    }
    
    .ctrl-desc {
      font-size: 12px;
      color: #8aa8c8;
    }
    
    #room-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      min-width: 200px;
      text-align: center;
    }
    
    #room-name {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #8b0000, #4b0082);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    
    #room-info {
      font-size: 12px;
      color: #6a8ab0;
    }
    
    #status-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      align-items: center;
      padding: 10px 20px;
      background: rgba(10, 15, 26, 0.95);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 10px;
      backdrop-filter: blur(12px);
    }
    
    #status-bar span {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      color: #6a8ab0;
    }
    
    #status-bar .fps {
      color: #00ffff;
      font-weight: 700;
      font-size: 13px;
    }
    
    /* Crosshair */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.15s;
    }
    
    #crosshair.visible {
      opacity: 1;
    }
    
    #crosshair .crosshair-line {
      position: absolute;
      background: rgba(0, 255, 255, 0.8);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    
    #crosshair .crosshair-line.horizontal {
      width: 20px;
      height: 2px;
    }
    
    #crosshair .crosshair-line.vertical {
      width: 2px;
      height: 20px;
    }
    
    #crosshair .crosshair-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(0, 255, 255, 0.9);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
    }
    
    /* Interaction Hint */
    #interaction-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 15, 26, 0.95);
      border: 1px solid rgba(0, 255, 255, 0.4);
      border-radius: 10px;
      padding: 12px 24px;
      color: #00ffff;
      font-size: 14px;
      font-weight: 600;
      display: none;
      z-index: 15;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
    }
    
    #interaction-hint.visible {
      display: block;
    }
    
    /* Minimap */
    .minimap-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 180px;
      height: 180px;
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(5, 8, 16, 0.95);
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .minimap-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Dialog System */
    .dialog-container {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 1000;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
    }
    
    .dialog-container.visible {
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }
    
    .dialog-box {
      background: rgba(10, 15, 26, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    
    .dialog-box.visible {
      transform: scale(1);
      opacity: 1;
    }
    
    .dialog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(100, 180, 255, 0.2);
    }
    
    .dialog-title {
      color: #00ffff;
      font-size: 16px;
      font-weight: 700;
    }
    
    .dialog-close {
      background: none;
      border: none;
      color: #8aa8c8;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }
    
    .dialog-close:hover {
      color: #00ffff;
    }
    
    .dialog-content {
      display: flex;
      gap: 16px;
      padding: 16px;
    }
    
    .dialog-avatar {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #8b0000, #4b0082);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #00ffff;
    }
    
    .dialog-message {
      flex: 1;
      color: #d0e0f8;
      font-size: 14px;
      line-height: 1.6;
    }
    
    /* Notification System */
    .notification-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    
    .notification {
      background: rgba(10, 15, 26, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #d0e0f8;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      animation: slideIn 0.3s ease;
    }
    
    .notification.hiding {
      opacity: 0;
      transform: translateX(100%);
      transition: all 0.3s ease;
    }
    
    .notification.success { border-color: rgba(0, 255, 0, 0.5); }
    .notification.error { border-color: rgba(255, 0, 0, 0.5); }
    .notification.warning { border-color: rgba(255, 255, 0, 0.5); }
    .notification.info { border-color: rgba(0, 255, 255, 0.5); }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      #controls-panel { display: none; }
      #room-panel { display: none; }
      #status-bar { display: none; }
      .minimap-container { display: none; }
      .dialog-box { width: 90%; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">
        <div class="loading-logo-icon">
          <i class="fas fa-graduation-cap"></i>
        </div>
      </div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div id="loading-text">Cargando Campus SENA...</div>
      <div class="loading-tips" id="loading-tips">Consejos: Usa WASD para moverte</div>
    </div>
  </div>

  <!-- Intro Container -->
  <div id="intro">
    <div id="intro-canvas"></div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="controls-panel" class="panel">
      <h3>Controles</h3>
      <div class="ctrl-grid">
        <span class="ctrl-key">W</span><span class="ctrl-desc">Adelante</span>
        <span class="ctrl-key">S</span><span class="ctrl-desc">Atrás</span>
        <span class="ctrl-key">A</span><span class="ctrl-desc">Izquierda</span>
        <span class="ctrl-key">D</span><span class="ctrl-desc">Derecha</span>
        <span class="ctrl-key">E</span><span class="ctrl-desc">Interactuar</span>
        <span class="ctrl-key">V</span><span class="ctrl-desc">VR</span>
        <span class="ctrl-key">Esc</span><span class="ctrl-desc">Menú</span>
      </div>
    </div>
    
    <div id="room-panel" class="panel">
      <h3>Ubicación</h3>
      <div id="room-name">Campus SENA</div>
      <div id="room-info">Manizales - Colombia</div>
    </div>
    
    <div id="status-bar" class="panel">
      <span id="mute-indicator">🔊</span>
      <span id="weather-indicator">☀️</span>
      <span id="coords">X: 0 · Z: 0 · Y: 0</span>
      <span class="fps" id="fps">FPS: --</span>
    </div>
    
    <div id="interaction-hint">Presiona <strong>E</strong> para interactuar</div>
  </div>

  <!-- Crosshair -->
  <div id="crosshair">
    <div class="crosshair-line horizontal"></div>
    <div class="crosshair-line vertical"></div>
    <div class="crosshair-dot"></div>
  </div>

  <!-- Minimap -->
  <div class="minimap-container">
    <canvas id="minimap"></canvas>
  </div>

  <!-- Dialog Container -->
  <div id="dialog-container" class="dialog-container">
    <div class="dialog-box">
      <div class="dialog-header">
        <span class="dialog-title" id="dialog-title">NPC</span>
        <button class="dialog-close" id="dialog-close">&times;</button>
      </div>
      <div class="dialog-content">
        <div class="dialog-avatar" id="dialog-avatar">
          <i class="fas fa-user"></i>
        </div>
        <div class="dialog-message" id="dialog-message">
          Hola, ¿en qué puedo ayudarte?
        </div>
      </div>
    </div>
  </div>

  <!-- Notification Container -->
  <div id="notification-container" class="notification-container"></div>

  <!-- App Container -->
  <div id="app"></div>

  <!-- Scripts -->
  <script type="module">
    // Simular carga
    const loadingBar = document.getElementById('loading-bar');
    const loadingText = document.getElementById('loading-text');
    const tips = ['Usa WASD para moverte', 'Mouse para mirar', 'E para interactuar', 'V para VR'];
    let progress = 0;
    let tipIndex = 0;
    
    const loadingInterval = setInterval(() => {
      progress += Math.random() * 8;
      if (progress >= 100) {
        progress = 100;
        clearInterval(loadingInterval);
      }
      loadingBar.style.width = `${progress}%`;
      
      tipIndex = (tipIndex + 1) % tips.length;
      loadingText.textContent = `Cargando... ${tips[tipIndex]}`;
    }, 150);
  </script>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
